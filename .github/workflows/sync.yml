name: Sync to Gitee and GitCode

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git user
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Extract repo and owner names
        run: |
          # 从 github.repository (格式: owner/repo) 中提取
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER_NAME="${GITHUB_REPOSITORY%%/*}"
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "OWNER_NAME=$OWNER_NAME" >> $GITHUB_ENV
          echo "当前仓库: $OWNER_NAME/$REPO_NAME"

      # ==================== Gitee ====================
      - name: Create Gitee repository if not exists
        run: |
          echo "检查 Gitee 仓库是否存在..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" \
            "https://gitee.com/api/v5/repos/${{ env.OWNER_NAME }}/${{ env.REPO_NAME }}")

          if [ "$HTTP_CODE" = "404" ]; then
            echo "仓库不存在，正在自动创建..."
            curl -X POST "https://gitee.com/api/v5/user/repos" \
              -H "Content-Type: application/json" \
              -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" \
              -d "{
                \"name\": \"${{ env.REPO_NAME }}\",
                \"private\": false,
                \"auto_init\": false
              }"
            echo "Gitee 仓库创建完成"
          else
            echo "Gitee 仓库已存在，跳过创建"
          fi

      - name: Push to Gitee
        run: |
          git remote add gitee https://${{ env.OWNER_NAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ env.OWNER_NAME }}/${{ env.REPO_NAME }}.git
          git push gitee --all --force
          git push gitee --tags --force

      # ==================== GitCode ====================
      - name: Create GitCode repository if not exists
        run: |
          echo "检查 GitCode 仓库是否存在..."
          PROJECT_PATH="${{ env.OWNER_NAME }}%2F${{ env.REPO_NAME }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "PRIVATE-TOKEN: ${{ secrets.GITCODE_TOKEN }}" \
            "https://gitcode.com/api/v4/projects/$PROJECT_PATH")

          if [ "$HTTP_CODE" = "404" ]; then
            echo "仓库不存在，正在自动创建..."
            curl -X POST "https://gitcode.com/api/v4/projects" \
              -H "Content-Type: application/json" \
              -H "PRIVATE-TOKEN: ${{ secrets.GITCODE_TOKEN }}" \
              -d "{
                \"name\": \"${{ env.REPO_NAME }}\",
                \"visibility\": \"public\",
                \"initialize_with_readme\": false
              }"
            echo "GitCode 仓库创建完成"
          else
            echo "GitCode 仓库已存在，跳过创建"
          fi

      - name: Push to GitCode
        run: |
          git remote add gitcode https://oauth2:${{ secrets.GITCODE_TOKEN }}@gitcode.com/${{ env.OWNER_NAME }}/${{ env.REPO_NAME }}.git
          git push gitcode --all --force
          git push gitcode --tags --force